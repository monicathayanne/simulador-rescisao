<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Rescisão - Contec</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>

    <style>
        :root { --contec-orange: #e67e22; --contec-dark: #2c3e50; }
        body { background-color: #f4f7f6; font-family: 'Segoe UI', sans-serif; }
        .card-contec { border-top: 6px solid var(--contec-orange); border-radius: 8px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .btn-contec { background-color: var(--contec-dark); color: white; border: none; font-weight: bold; padding: 15px; width: 100%; border-radius: 5px; }
        .btn-contec:hover { background-color: #1a252f; }
        .secao-titulo { background: #eee; padding: 8px 15px; font-weight: bold; margin-bottom: 15px; border-left: 4px solid var(--contec-orange); color: var(--contec-dark); }
        .resumo-box { background-color: #fff; border-radius: 6px; border: 1px solid #dee2e6; }
        /* Estilo para os campos editáveis na tabela */
        .input-editavel { border: 1px dashed #ccc; background: transparent; width: 100%; padding: 2px 5px; font-size: 0.95rem; }
        .input-editavel:focus { border: 1px solid var(--contec-orange); outline: none; background: #fffdfa; }
        .btn-voltar {
            color: var(--contec-dark);
            text-decoration: none;
            font-weight: bold;
            font-size: 0.9rem;
            display: inline-flex;
            align-items: center;
            margin-bottom: 15px;
            transition: 0.2s;
        }
        .btn-voltar:hover {
            color: var(--contec-orange);
        }
    </style>
</head>
            <!-- Botão Voltar Corrigido -->
        <a href="https://monicathayanne.github.io/portal-contec/" class="btn-voltar">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-arrow-left me-2" viewBox="0 0 16 16">
                <path fill-rule="evenodd" d="M15 8a.5.5 0 0 0-.5-.5H2.707l3.147-3.146a.5.5 0 1 0-.708-.708l-4 4a.5.5 0 0 0 0 .708l4 4a.5.5 0 0 0 .708-.708L2.707 8.5H14.5A.5.5 0 0 0 15 8"/>
            </svg>
            Voltar para o Portal Contec
        </a>
        
<body class="p-3 p-md-5">

<div class="container">
    <div class="card card-contec mx-auto" style="max-width: 900px;">
        <div class="card-header bg-white py-3 text-center">
            <h4 class="mb-0" style="color: var(--contec-dark);">Simulador de Rescisão</h4>
        </div>
        
        <div class="card-body">

            <div class="row g-3 mb-4">
                <div class="col-md-6">
                    <label class="form-label fw-bold">Nome do Funcionário</label>
                    <input type="text" id="nomeFunc" class="form-control" placeholder="Ex: João Silva">
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-bold">Salário Base (R$)</label>
                    <input type="text" id="salarioBase" class="form-control" placeholder="R$ 0,00" oninput="mascaraMoeda(this)">
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-bold">Data de Admissão</label>
                    <input type="date" id="dataAdmissao" class="form-control">
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-bold">Data de Demissão</label>
                    <input type="date" id="dataDemissao" class="form-control">
                </div>
            </div>

            <div class="secao-titulo">VERBAS EM ATRASO E FGTS</div>
            
            <div class="row g-3 mb-4">
                <div class="col-md-3">
                    <div class="border rounded p-2 bg-white text-center">
                        <label class="small fw-bold d-block mb-1">Férias Vencidas (Qtd)</label>
                        <input type="number" id="qtdFeriasVencidas" class="form-control form-control-sm mx-auto text-center fw-bold" value="0" min="0" style="max-width: 70px;">
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="border rounded p-2 bg-white text-center">
                        <label class="small fw-bold d-block mb-1">13º Vencido (Qtd)</label>
                        <input type="number" id="qtd13Vencido" class="form-control form-control-sm mx-auto text-center fw-bold" value="0" min="0" style="max-width: 70px;">
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="border rounded p-2 bg-white">
                        <div class="form-check form-switch mb-1">
                            <input class="form-check-input" type="checkbox" id="checkMulta" onchange="gerenciarFGTS()">
                            <label class="form-check-label small fw-bold" for="checkMulta">Multa 40%</label>
                        </div>
                        <div class="form-check form-switch">
                            <input class="form-check-input" type="checkbox" id="checkAviso">
                            <label class="form-check-label small fw-bold" for="checkAviso">Aviso Prévio Ind.</label>
                        </div>
                    </div>
                </div>

                <div class="col-md-3">
                    <div class="border border-danger rounded p-2 h-100" style="background: #fff5f5;">
                        <label class="small text-danger fw-bold d-block mb-1">Adiantamentos</label>
                        <input type="text" id="valorAdiantamento" class="form-control form-control-sm border-0 bg-transparent text-danger fw-bold shadow-none" oninput="mascaraMoeda(this)" placeholder="R$ 0,00">
                    </div>
                </div>
                <div class="col-12" id="boxFGTS" style="display:none;">
                    <div class="alert alert-secondary border-0 mb-0 py-2">
                        <label class="form-label small mb-1 text-dark fw-bold">Saldo FGTS Base (Projetado):</label>
                        <input type="text" id="saldoFGTS" class="form-control bg-white" oninput="mascaraMoeda(this)">
                    </div>
                </div>
            </div>

            <div class="row g-2">
                <div class="col-md-9">
                    <button onclick="processarCalculo()" class="btn btn-contec">GERAR CÁLCULO</button>
                </div>
                <div class="col-md-3">
                    <button onclick="limparCampos()" class="btn btn-outline-secondary w-100 py-3 fw-bold">LIMPAR</button>
                </div>
            </div>

            <!-- Resultados -->
            <div id="areaResultado" style="display: none;" class="resumo-box p-4 mt-4 shadow-sm">
                <p class="small text-muted mb-2 font-italic">* Você pode editar as descrições das verbas abaixo antes de gerar o PDF.</p>
                <table class="table align-middle">
                    <thead class="table-dark">
                        <tr>
                            <th>Verba Descrita (Clique para editar)</th>
                            <th class="text-end">Valor Simulado</th>
                        </tr>
                    </thead>
                    <tbody id="tabelaItens"></tbody>
                    <tfoot>
                        <tr style="background-color: var(--contec-dark); color: white;">
                            <th class="py-3">TOTAL LÍQUIDO ESTIMADO</th>
                            <th class="py-3 text-end" id="totalFinal" style="font-size: 1.2rem;">R$ 0,00</th>
                        </tr>
                    </tfoot>
                </table>
                <button onclick="gerarPDF()" class="btn btn-success w-100 fw-bold py-2 mt-2">GERAR PDF DO RELATÓRIO</button>
            </div>
        </div>
    </div>
</div>

<script>
function mascaraMoeda(i) {
    let v = i.value.replace(/\D/g,'');
    v = (v/100).toFixed(2) + '';
    v = v.replace(".", ",");
    v = v.replace(/(\d)(\d{3})(\d{3}),/g, "$1.$2.$3,");
    v = v.replace(/(\d)(\d{3}),/g, "$1.$2,");
    i.value = v === "0,00" ? "" : "R$ " + v;
}

function parseValor(valorStr) {
    if (!valorStr) return 0;
    let limpo = valorStr.replace("R$ ", "").replace(/\./g, "").replace(",", ".");
    return parseFloat(limpo) || 0;
}

function fM(valor) {
    return valor.toLocaleString('pt-br', {style: 'currency', currency: 'BRL'});
}

function gerenciarFGTS() {
    const box = document.getElementById('boxFGTS');
    const check = document.getElementById('checkMulta');
    const salario = parseValor(document.getElementById('salarioBase').value);
    const d1 = new Date(document.getElementById('dataAdmissao').value + "T00:00:00");
    const d2 = new Date(document.getElementById('dataDemissao').value + "T00:00:00");

    if (check.checked) {
        box.style.display = 'block';
        if (salario > 0 && !isNaN(d1) && !isNaN(d2)) {
            let meses = (d2.getFullYear() - d1.getFullYear()) * 12 + (d2.getMonth() - d1.getMonth());
            if (d2.getDate() >= 15) meses++;
            document.getElementById('saldoFGTS').value = fM(salario * 0.08 * meses);
        }
    } else {
        box.style.display = 'none';
    }
}

function processarCalculo() {
    const salario = parseValor(document.getElementById('salarioBase').value);
    const d1Str = document.getElementById('dataAdmissao').value;
    const d2Str = document.getElementById('dataDemissao').value;
    const adiantamento = parseValor(document.getElementById('valorAdiantamento').value);
    const qtdFerias = parseInt(document.getElementById('qtdFeriasVencidas').value) || 0;
    const qtd13v = parseInt(document.getElementById('qtd13Vencido').value) || 0;
    const temAviso = document.getElementById('checkAviso').checked;

    if (!salario || !d1Str || !d2Str) return alert("Preencha Salário e Datas.");

    const d1 = new Date(d1Str + "T00:00:00");
    const d2 = new Date(d2Str + "T00:00:00");

    let totalGeral = 0;
    let html = "";

    function addLinha(descricao, valor) {
        if (valor <= 0) return;
        totalGeral += valor;
        html += `<tr>
            <td><input type="text" class="input-editavel verba-nome" value="${descricao}"></td>
            <td class="text-end fw-bold verba-valor">${fM(valor)}</td>
        </tr>`;
    }

    // --- SALDO DE SALÁRIO (MÊS COMERCIAL 30 DIAS) ---
    let diasS = d2.getDate();
    const ultimoDiaDoMesAtual = new Date(d2.getFullYear(), d2.getMonth() + 1, 0).getDate();
    if (diasS === 31 || (d2.getMonth() === 1 && diasS === ultimoDiaDoMesAtual)) {
        diasS = 30;
    }
    addLinha(`Saldo de Salário (${diasS} dia(s))`, (salario / 30) * diasS);

    // --- 13º SALÁRIO ---
    const anoD = d2.getFullYear();
    const ini13 = (d1.getFullYear() === anoD) ? d1 : new Date(anoD, 0, 1);
    let av13 = (d2.getMonth() - ini13.getMonth()) + 1;
    if (d2.getDate() < 15) av13--;
    if (av13 > 0) addLinha(`13° Salário Proporcional (${av13}/12)`, (salario / 12) * av13);
    if (qtd13v > 0) addLinha(`13º Salário Integral em Atraso (${qtd13v} período(s))`, salario * qtd13v);

    // --- FÉRIAS ---
    let mTotal = (d2.getFullYear() - d1.getFullYear()) * 12 + (d2.getMonth() - d1.getMonth());
    if (d2.getDate() >= 15) mTotal++;
    
    let avF = mTotal % 12;
    if (avF > 0) {
        const vF = (salario / 12) * avF;
        addLinha(`Férias Proporcionais (${avF}/12)`, vF);
        addLinha(`1/3 das Férias (Proporcional)`, vF / 3);
    }
    if (qtdFerias > 0) {
        const valorFv = salario * qtdFerias;
        addLinha(`Férias Vencidas (${qtdFerias} período(s))`, valorFv);
        addLinha(`1/3 das Férias (Sobre Vencidas)`, valorFv / 3);
    }

    // --- AVISO PRÉVIO INDENIZADO (LEI 12.506/2011) ---
    if (temAviso) {
        let anosCompletos = Math.floor(mTotal / 12);
        let diasAviso = 30 + (anosCompletos * 3);
        if (diasAviso > 90) diasAviso = 90; // Teto legal
        
        const valorAviso = (salario / 30) * diasAviso;
        addLinha(`Aviso Prévio Indenizado (${diasAviso} dias)`, valorAviso);
        
        // Reflexos do Aviso (Projeção)
        addLinha(`13º Salário s/ Aviso Prévio (1/12)`, salario / 12);
        const feriasAviso = salario / 12;
        addLinha(`Férias s/ Aviso Prévio (1/12)`, feriasAviso);
        addLinha(`1/3 de Férias s/ Aviso Prévio`, feriasAviso / 3);
    }

    // --- MULTA FGTS ---
    if (document.getElementById('checkMulta').checked) {
        const valorSaldo = parseValor(document.getElementById('saldoFGTS').value);
        addLinha("Multa FGTS (40%)", valorSaldo * 0.40);
    }

    // --- DESCONTOS ---
    if (adiantamento > 0) {
        totalGeral -= adiantamento;
        html += `<tr>
            <td><input type="text" class="input-editavel verba-nome text-danger" value="(-) Adiantamentos Pagos"></td>
            <td class="text-end fw-bold text-danger verba-valor">- ${fM(adiantamento)}</td>
        </tr>`;
    }

    document.getElementById('tabelaItens').innerHTML = html;
    document.getElementById('totalFinal').innerText = fM(totalGeral);
    document.getElementById('areaResultado').style.display = 'block';
}

function gerarPDF() {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    
    // Captura os nomes editados na tabela
    const nomesEditados = document.querySelectorAll('.verba-nome');
    const valoresExibidos = document.querySelectorAll('.verba-valor');
    const itensParaPDF = [];
    
    nomesEditados.forEach((input, index) => {
        itensParaPDF.push([input.value, valoresExibidos[index].innerText]);
    });

    const nomeF = document.getElementById('nomeFunc').value || "Não informado";
    const d1 = new Date(document.getElementById('dataAdmissao').value + "T00:00:00").toLocaleDateString();
    const d2 = new Date(document.getElementById('dataDemissao').value + "T00:00:00").toLocaleDateString();

    doc.setFillColor(44, 62, 80);
    doc.rect(0, 0, 210, 45, 'F');
    doc.setTextColor(255, 255, 255);
    doc.setFontSize(22);
    doc.text("CONTEC CONTABILIDADE", 15, 25);
    doc.setFontSize(10);
    doc.text("SIMULATIVO DE VERBAS RESCISÓRIAS", 15, 34);

    doc.setTextColor(0);
    doc.setFontSize(11);
    doc.text(`Funcionário: ${nomeF}`, 15, 55);
    doc.text(`Período: ${d1} a ${d2}`, 15, 62);
    doc.text(`Salário Base: ${document.getElementById('salarioBase').value}`, 15, 69);

    doc.autoTable({
        startY: 75,
        head: [['Verba Descrita', 'Valor Simulado']],
        body: itensParaPDF,
        headStyles: { fillColor: [230, 126, 34] },
        foot: [['TOTAL LÍQUIDO ESTIMADO', document.getElementById('totalFinal').innerText]],
        footStyles: { fillColor: [44, 62, 80] }
    });

    doc.save(`Rescisao_Contec_${nomeF}.pdf`);
}

function limparCampos() {
    // 1. Limpa os inputs de texto e números
    document.getElementById('nomeFunc').value = "";
    document.getElementById('salarioBase').value = "";
    document.getElementById('dataAdmissao').value = "";
    document.getElementById('dataDemissao').value = "";
    document.getElementById('valorAdiantamento').value = "";
    document.getElementById('qtdFeriasVencidas').value = "0";
    document.getElementById('qtd13Vencido').value = "0";
    
    // 2. Desmarca os switches (Multa e Aviso)
    document.getElementById('checkMulta').checked = false;
    document.getElementById('checkAviso').checked = false;
    
    // 3. Esconde o box do FGTS (caso estivesse aberto)
    document.getElementById('boxFGTS').style.display = 'none';
    document.getElementById('saldoFGTS').value = "";
    
    // 4. Esconde a área de resultados e limpa a tabela
    document.getElementById('areaResultado').style.display = 'none';
    document.getElementById('tabelaItens').innerHTML = "";
    document.getElementById('totalFinal').innerText = "R$ 0,00";

    // 5. Coloca o foco de volta no primeiro campo
    document.getElementById('nomeFunc').focus();
}
</script>
</body>
</html>
